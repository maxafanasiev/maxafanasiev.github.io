<!DOCTYPE html>
<html>
<head>
    <title>Telegram Mini App</title>
    <meta charset="UTF-8"/>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #f0f0f0;
            padding: 20px;
        }

        .title {
            margin-bottom: 20px;
        }

        .tabs {
            overflow: hidden;
            border: 1px solid #333;
            background-color: #1e1e1e;
            border-radius: 8px;
        }

        .tab-button {
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            background-color: #1e1e1e;
            color: #f0f0f0;
            transition: 0.3s;
            font-size: 17px;
        }

        .tab-button:hover {
            background-color: #2a2a2a;
        }

        .tab-button.active {
            background-color: #333;
            font-weight: bold;
        }

        .tab-content {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
        }

        .tab-content.active {
            display: flex;
        }

        .navigate-button,
        .source-button {
            padding: 12px 20px;
            background-color: #0077ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        .source-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #333;
            color: #aaa;
            border: 1px solid #555;
        }

        .navigate-button:hover,
        .source-button:hover {
            background-color: #005fcc;
        }

        .server-response {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .source {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .source-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .connected {
            background-color: #4caf50;
        }

        .not-connected {
            background-color: #f44336;
        }

        .icon {
            font-size: 20px;
            margin-right: 10px;
            width: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
<h2 class="title" id="title">Telegram User Info</h2>
<div class="tabs">
    <button class="tab-button active" id="user-tab-button" onclick="openTab('user-tab')">User Info</button>
    <button class="tab-button" id="sources-tab-button" onclick="openTab('sources-tab')">Social Media</button>
    <button class="tab-button" id="platform-tab-button" onclick="openTab('platform-tab')">Platform</button>
</div>
<div id="user-tab" class="tab-content active"></div>
<div id="sources-tab" class="tab-content"></div>
<div id="platform-tab" class="tab-content"></div>
<pre class="server-response" id="server-response"></pre>
<script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const user = Telegram.WebApp.initDataUnsafe.user || {};

    if (!user.id) {
        document.body.innerHTML = `
            <div style="
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background-color: #121212;
                color: #fff;
                font-family: sans-serif;
                text-align: center;
            ">
                <h1 style="font-size: 48px; margin-bottom: 16px;">404</h1>
                <p style="font-size: 18px;">Telegram user not found.<br>Please open this app through Telegram.</p>
            </div>
        `;
        throw new Error("Telegram user not found");
    }

    const BASE_URL = "https://readily-special-grouper.ngrok-free.app";
    const responseBox = document.getElementById("server-response");

    const telegram_id = user.id;
    const USER_INFO_PAYLOAD = {
        id: telegram_id,
        first_name: user.first_name || "",
        last_name: user.last_name || "",
        username: user.username || "",
        language_code: user.language_code || ""
    };

    const SOURCES_DATA = [
        {key: "youtubeConnected", name: "YouTube", icon: "fab fa-youtube", disabled: false},
        {key: "redditConnected", name: "Reddit", icon: "fab fa-reddit", disabled: true},
        {key: "linkedinConnected", name: "LinkedIn", icon: "fab fa-linkedin", disabled: true},
        {key: "spotifyConnected", name: "Spotify", icon: "fab fa-spotify", disabled: true},
        {key: "xConnected", name: "X", icon: "fab fa-x-twitter", disabled: true}
    ];

    let userData;

    const fetchUserData = async () => {
        try {
            const res = await fetch(`${BASE_URL}/user/me`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(USER_INFO_PAYLOAD)
            });
            return await res.json();
        } catch (err) {
            console.error("Error fetching user data:", err);
            return null;
        }
    };

    const fillUserInfo = async () => {
        const data = await fetchUserData();
        if (!data) return;
        userData = data;
        tabs['user-tab'].element.innerHTML = `
         ${data.googlePicture ? `<img src="${data.googlePicture}" width="40" height="40"/>` : ""}
         <p><strong>Telegram ID:</strong> ${data.telegramId}</p>
         <p><strong>Name:</strong> ${data.telegramFirstName} ${data.telegramLastName}</p>
         <p><strong>Username:</strong> @${data.telegramUsername}</p>
         <p><strong>Language:</strong> ${data.telegramLanguageCode}</p>
         ${data.googleSub ? `<p><strong>Google SUB:</strong> ${data.googleSub}</p>` : ""}
         ${data.googleEmail ? `<p><strong>Google Email:</strong> ${data.googleEmail}</p>` : ""}
         ${data.googleName ? `<p><strong>Google Name:</strong> ${data.googleName}</p>` : ""}
          ${data.device ? `<p><strong>Device:</strong> ${data.device}</p>` : ""}
          ${data.os ? `<p><strong>OS:</strong> ${data.os}</p>` : ""}
          ${data.browser ? `<p><strong>Browser:</strong> ${data.browser}</p>` : ""}
          ${data.geoIp ? `<p><strong>IP:</strong> ${data.geoIp}</p>` : ""}
          ${data.geoCity ? `<p><strong>City:</strong> ${data.geoCity}</p>` : ""}
          ${data.geoRegion ? `<p><strong>Region:</strong> ${data.geoRegion}</p>` : ""}
          ${data.geoCountry ? `<p><strong>Country:</strong> ${data.geoCountry}</p>` : ""}
          ${data.geoPostalCode ? `<p><strong>Postal Code:</strong> ${data.geoPostalCode}</p>` : ""}
          ${data.geoLatitude ? `<p><strong>Latitude:</strong> ${data.geoLatitude}</p>` : ""}
          ${data.geoLongitude ? `<p><strong>Longitude:</strong> ${data.geoLongitude}</p>` : ""}
          ${data.geoTimezone ? `<p><strong>Timezone:</strong> ${data.geoTimezone}</p>` : ""}
          ${data.geoCurrency ? `<p><strong>Currency:</strong> ${data.geoCurrency}</p>` : ""}
          ${!data.googleSub ? `
            <button class="navigate-button" onclick="handleGoogleAuth()">
              Connect Google
            </button>
          ` : ""}
         <button class="navigate-button" style="background:#cc0000" onclick="deleteUser()">Delete User</button>
       `;
    };

    const handleGoogleAuth = () => {
        if (userData.googleSub) {
            responseBox.textContent = "Need to implement disconnect logic.";
        } else {
            Telegram.WebApp.openLink(`${BASE_URL}/auth/google?telegram_id=${telegram_id}`);
        }
    };

    const deleteUser = () => {
        if (!confirm("Delete your user data?")) return;
        fetch(`${BASE_URL}/user`, {
            method: "DELETE",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(USER_INFO_PAYLOAD)
        })
            .then(res => res.status === 204 ? Telegram.WebApp.close() : Promise.reject("Failed"))
            .catch(err => responseBox.textContent = err);
    };

    const fillSourcesInfo = () => {
        tabs['sources-tab'].element.innerHTML = "";
        SOURCES_DATA.forEach(source => {
            const connected = userData[source.key];

            const wrapper = document.createElement("div");
            wrapper.className = "source";

            const icon = document.createElement("i");
            icon.className = `icon ${source.icon}`;

            const button = document.createElement("button");
            button.className = "source-button";
            button.textContent = connected ? `Disconnect ${source.name}` : `Connect ${source.name}`;

            if (source.disabled) {
                button.disabled = true;
            } else {
                button.onclick = () => {
                    if (connected) {
                        if (!confirm("Are you sure?")) return;
                        fetch(`${BASE_URL}/${source.name.toLowerCase()}/disconnect`, {
                            method: "DELETE",
                            headers: {"Content-Type": "application/json"},
                            body: JSON.stringify(USER_INFO_PAYLOAD)
                        }).then(res => {
                            if (res.status === 204) {
                                fillUserInfo().then(fillSourcesInfo);
                            }
                        });
                    } else {
                        Telegram.WebApp.openLink(`${BASE_URL}/auth/${source.name.toLowerCase()}?telegram_id=${telegram_id}`);
                    }
                };
            }

            const indicator = document.createElement("div");
            indicator.className = `source-indicator ${connected ? "connected" : "not-connected"}`;

            wrapper.append(icon, button, indicator);
            tabs['sources-tab'].element.appendChild(wrapper);
        });
    };
    const PLATFORM_OPTIONS = [
        {
            platform: "YouTube",
            value: "youtube",
            types: [
                {label: "Liked Videos", value: "yt_liked_videos"},
                {label: "Subscriptions", value: "yt_subscriptions"}
            ]
        }
    ];

    const fillPlatformInfo = () => {
        const container = tabs['platform-tab'].element;
        container.innerHTML = "";

        const platformSelect = document.createElement("select");
        platformSelect.style.padding = "10px";
        platformSelect.style.borderRadius = "8px";
        platformSelect.style.marginBottom = "10px";
        platformSelect.style.backgroundColor = "#2a2a2a";
        platformSelect.style.color = "#fff";

        PLATFORM_OPTIONS.forEach(p => {
            const option = document.createElement("option");
            option.value = p.value;
            option.textContent = p.platform;
            platformSelect.appendChild(option);
        });

        const dataTypeSelect = document.createElement("select");
        dataTypeSelect.style.padding = "10px";
        dataTypeSelect.style.borderRadius = "8px";
        dataTypeSelect.style.marginBottom = "10px";
        dataTypeSelect.style.backgroundColor = "#2a2a2a";
        dataTypeSelect.style.color = "#fff";

        const updateDataTypes = () => {
            const selectedPlatform = platformSelect.value;
            const platform = PLATFORM_OPTIONS.find(p => p.value === selectedPlatform);
            dataTypeSelect.innerHTML = "";
            platform.types.forEach(t => {
                const option = document.createElement("option");
                option.value = t.value;
                option.textContent = t.label;
                dataTypeSelect.appendChild(option);
            });
        };

        platformSelect.addEventListener("change", updateDataTypes);
        updateDataTypes();

        const fetchButton = document.createElement("button");
        fetchButton.className = "navigate-button";
        fetchButton.textContent = "Get Data";

        const output = document.createElement("div");
        output.className = "server-response";

        fetchButton.onclick = async () => {
            const platform = platformSelect.value;
            const data_type = dataTypeSelect.value;
            const telegram_id = USER_INFO_PAYLOAD.id;

            try {
                const queryParams = new URLSearchParams({
                    telegram_id,
                    data_type
                }).toString();

                const res = await fetch(`${BASE_URL}/data/${platform}?${queryParams}`, {
                    method: "GET",
                    headers: {"Content-Type": "application/json"}
                });

                const json = await res.json();
                output.textContent = JSON.stringify(json, null, 2);
            } catch (err) {
                output.textContent = `Error: ${err.message}`;
            }
        };

        container.appendChild(platformSelect);
        container.appendChild(dataTypeSelect);
        container.appendChild(fetchButton);
        container.appendChild(output);
    };

    const tabs = {
        'user-tab': {
            element: document.getElementById("user-tab"),
            button: document.getElementById("user-tab-button"),
            title: "Telegram User Info",
            fill: fillUserInfo
        },
        'sources-tab': {
            element: document.getElementById("sources-tab"),
            button: document.getElementById("sources-tab-button"),
            title: "Social Media",
            fill: fillSourcesInfo
        },
        'platform-tab': {
            element: document.getElementById("platform-tab"),
            button: document.getElementById("platform-tab-button"),
            title: "Platform",
            fill: fillPlatformInfo
        }
    };

    let activeTab = tabs["user-tab"];
    activeTab.fill();

    const openTab = (tabId) => {
        activeTab.element.classList.remove("active");
        activeTab.button.classList.remove("active");
        activeTab = tabs[tabId];
        activeTab.element.classList.add("active");
        activeTab.button.classList.add("active");
        document.getElementById("title").textContent = activeTab.title;
        activeTab.fill();
    };

</script>
</body>
</html>
