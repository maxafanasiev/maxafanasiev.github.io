<!DOCTYPE html>
<html>
<head>
  <title>Telegram Mini App</title>
  <meta charset="UTF-8"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: sans-serif;
      background-color: #121212;
      color: #f0f0f0;
      padding: 20px;
    }

    .title {
      margin-bottom: 20px;
    }

    .tabs {
      overflow: hidden;
      border: 1px solid #333;
      background-color: #1e1e1e;
      border-radius: 8px;
    }

    .tab-button {
      float: left;
      border: none;
      outline: none;
      cursor: pointer;
      padding: 14px 16px;
      background-color: #1e1e1e;
      color: #f0f0f0;
      transition: 0.3s;
      font-size: 17px;
    }

    .tab-button:hover {
      background-color: #2a2a2a;
    }

    .tab-button.active {
      background-color: #333;
      font-weight: bold;
    }

    .tab-content {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      background-color: #1e1e1e;
      padding: 10px;
      border-radius: 8px;
    }

    .tab-content.active {
      display: flex;
    }

    .navigate-button,
    .source-button {
      padding: 12px 20px;
      background-color: #0077ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }

    .navigate-button:hover,
    .source-button:hover {
      background-color: #005fcc;
    }

    .server-response {
      background: #1e1e1e;
      padding: 10px;
      border-radius: 8px;
      margin-top: 20px;
      font-family: monospace;
      white-space: pre-wrap;
    }

    .source {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .source-indicator {
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }

    .connected {
      background-color: #4caf50;
    }

    .not-connected {
      background-color: #f44336;
    }

    .icon {
      font-size: 20px;
      margin-right: 10px;
      width: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2 class="title" id="title">Telegram User Info</h2>
  <div class="tabs">
    <button class="tab-button active" id="user-tab-button" onclick="openTab('user-tab')">User Info</button>
    <button class="tab-button" id="sources-tab-button" onclick="openTab('sources-tab')">Social Media</button>
    <button class="tab-button" id="platform-tab-button" onclick="openTab('platform-tab')">Platform</button>
  </div>
  <div id="user-tab" class="tab-content active"></div>
  <div id="sources-tab" class="tab-content"></div>
  <div id="platform-tab" class="tab-content"></div>
  <pre class="server-response" id="server-response"></pre>
  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const BASE_URL = "https://readily-special-grouper.ngrok-free.app";
    const responseBox = document.getElementById("server-response");

    const user = Telegram.WebApp.initDataUnsafe.user || {};
    const telegram_id = user.id;
    const USER_INFO_PAYLOAD = {
      id: telegram_id,
      first_name: user.first_name || "",
      last_name: user.last_name || "",
      username: user.username || "",
      language_code: user.language_code || ""
    };

    const SOURCES_DATA = [
      { key: "youtubeConnected", name: "YouTube", icon: "fab fa-youtube" },
      { key: "redditConnected", name: "Reddit", icon: "fab fa-reddit" },
      { key: "linkedinConnected", name: "LinkedIn", icon: "fab fa-linkedin" },
      { key: "spotifyConnected", name: "Spotify", icon: "fab fa-spotify" },
      { key: "xConnected", name: "X", icon: "fab fa-x-twitter" }
    ];

    let userData;

    const fetchUserData = async () => {
      try {
        const res = await fetch(`${BASE_URL}/user/me`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(USER_INFO_PAYLOAD)
        });
        return await res.json();
      } catch (err) {
        console.error("Error fetching user data:", err);
        return null;
      }
    };

    const fillUserInfo = async () => {
      const data = await fetchUserData();
      if (!data) return;
      userData = data;
      tabs['user-tab'].element.innerHTML = `
        <p><strong>Telegram ID:</strong> ${data.telegramId}</p>
        <p><strong>Name:</strong> ${data.telegramFirstName} ${data.telegramLastName}</p>
        <p><strong>Username:</strong> @${data.telegramUsername}</p>
        <p><strong>Language:</strong> ${data.telegramLanguageCode}</p>
        ${data.googleEmail ? `<p><strong>Google:</strong> ${data.googleEmail}</p>` : ""}
        ${data.googlePicture ? `<img src="${data.googlePicture}" width="40" height="40"/>` : ""}
        <button class="navigate-button" onclick="handleGoogleAuth()">
          ${data.googleEmail ? "Disconnect Google" : "Connect Google"}
        </button>
        <button class="navigate-button" style="background:#cc0000" onclick="deleteUser()">Delete User</button>
      `;
    };

    const handleGoogleAuth = () => {
      if (userData.googleEmail) {
        responseBox.textContent = "Need to implement disconnect logic.";
      } else {
        Telegram.WebApp.openLink(`${BASE_URL}/auth/google?telegram_id=${telegram_id}`);
      }
    };

    const deleteUser = () => {
      if (!confirm("Delete your user data?")) return;
      fetch(`${BASE_URL}/user`, {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(USER_INFO_PAYLOAD)
      })
        .then(res => res.status === 204 ? Telegram.WebApp.close() : Promise.reject("Failed"))
        .catch(err => responseBox.textContent = err);
    };

    const fillSourcesInfo = () => {
      tabs['sources-tab'].element.innerHTML = "";
      SOURCES_DATA.forEach(source => {
        const connected = userData[source.key];
        const wrapper = document.createElement("div");
        wrapper.className = "source";
        const icon = document.createElement("i");
        icon.className = `icon ${source.icon}`;
        const button = document.createElement("button");
        button.className = "source-button";
        button.textContent = connected ? `Disconnect ${source.name}` : `Connect ${source.name}`;
        button.onclick = () => {
          if (connected) {
            fetch(`${BASE_URL}/${source.name.toLowerCase()}/disconnect`, {
              method: "DELETE",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(USER_INFO_PAYLOAD)
            }).then(res => {
              if (res.status === 204) {
                fillUserInfo().then(fillSourcesInfo);
              }
            });
          } else {
            Telegram.WebApp.openLink(`${BASE_URL}/auth/${source.name.toLowerCase()}?telegram_id=${telegram_id}`);
          }
        };
        const indicator = document.createElement("div");
        indicator.className = `source-indicator ${connected ? "connected" : "not-connected"}`;
        wrapper.append(icon, button, indicator);
        tabs['sources-tab'].element.appendChild(wrapper);
      });
    };

    const fillPlatformInfo = () => {
      tabs['platform-tab'].element.innerHTML = `<div>Platform Data Will be Here</div>`;
    };

    const tabs = {
      'user-tab': {
        element: document.getElementById("user-tab"),
        button: document.getElementById("user-tab-button"),
        title: "Telegram User Info",
        fill: fillUserInfo
      },
      'sources-tab': {
        element: document.getElementById("sources-tab"),
        button: document.getElementById("sources-tab-button"),
        title: "Social Media",
        fill: fillSourcesInfo
      },
      'platform-tab': {
        element: document.getElementById("platform-tab"),
        button: document.getElementById("platform-tab-button"),
        title: "Platform",
        fill: fillPlatformInfo
      }
    };

    let activeTab = tabs["user-tab"];
    activeTab.fill();

    const openTab = (tabId) => {
      activeTab.element.classList.remove("active");
      activeTab.button.classList.remove("active");
      activeTab = tabs[tabId];
      activeTab.element.classList.add("active");
      activeTab.button.classList.add("active");
      document.getElementById("title").textContent = activeTab.title;
      activeTab.fill();
    };
  </script>
</body>
</html>
